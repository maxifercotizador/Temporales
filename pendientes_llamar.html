<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pendientes de llamar · Maxifer</title>
<style>
  :root {
    --green: #1f7c3f;
    --green-bg: #d8f3df;
    --orange: #d97706;
    --red: #c8102e;
    --text: #1a1a1a;
    --text-mute: #6b7280;
    --gray: #94a3b8;
    --bg: #f8f9fb;
    --card: #ffffff;
    --border: #e5e5e5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 80px;
  }
  header.top {
    background: white; padding: 16px 18px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  header.top h1 { margin: 0; font-size: 1.2rem; }
  header.top h1 .accent { color: var(--green); }
  .meta-bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 18px; background: white; border-bottom: 1px solid var(--border);
    font-size: .85rem; color: var(--text-mute);
  }
  .meta-bar .pill {
    background: var(--green-bg); color: var(--green);
    padding: 3px 10px; border-radius: 12px; font-weight: 600; font-size: .8rem;
  }
  .meta-bar .pill.muted { background: #f1f5f9; color: var(--text-mute); }

  .container { max-width: 760px; margin: 0 auto; padding: 14px 14px 30px; }

  .filters {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .filters input {
    flex: 1; min-width: 180px; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; background: white;
  }
  .filters .filter-btn {
    background: white; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; cursor: pointer; font-size: .85rem; color: var(--text-mute);
    user-select: none;
  }
  .filters .filter-btn.active {
    background: var(--green); color: white; border-color: var(--green);
  }

  .form-add {
    background: white; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 14px; display: none;
  }
  .form-add.open { display: block; }
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .form-grid label { font-size: 11px; color: #555; display: flex; flex-direction: column; gap: 3px; }
  .form-grid label.full { grid-column: 1 / -1; }
  .form-grid input, .form-grid textarea {
    padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    font-family: inherit;
  }
  .form-grid textarea { resize: vertical; min-height: 50px; }
  .form-actions {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px;
  }

  .item {
    background: white; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
    display: grid; grid-template-columns: 1fr auto; gap: 8px 12px;
    align-items: start;
  }
  .item.done { opacity: .55; background: #fafafa; }
  .item.done .item-name { text-decoration: line-through; color: var(--text-mute); }
  .item-name { font-weight: 600; font-size: 1rem; }
  .item-meta { color: var(--text-mute); font-size: .82rem; margin-top: 2px; }
  .item-meta a { color: var(--green); text-decoration: none; font-weight: 500; }
  .item-motivo { font-size: .9rem; margin-top: 6px; }
  .item-notas {
    background: #fffde9; border-left: 3px solid #e6c200; padding: 6px 10px;
    margin-top: 6px; font-size: .82rem; color: #555; border-radius: 0 4px 4px 0;
  }
  .item-actions {
    display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
  }
  .item-time { font-size: .72rem; color: #aaa; }
  .item-actions .btn-mini {
    background: white; border: 1px solid var(--border); border-radius: 16px;
    padding: 4px 10px; font-size: .75rem; cursor: pointer; color: var(--text-mute);
    white-space: nowrap;
  }
  .item-actions .btn-mini.green { color: var(--green); border-color: var(--green); }
  .item-actions .btn-mini.green:hover { background: var(--green-bg); }
  .item-actions .btn-mini.red { color: var(--red); }
  .item-actions .btn-mini.red:hover { background: #fde8eb; }

  .empty {
    text-align: center; padding: 50px 20px; color: var(--text-mute);
    background: white; border-radius: 8px; border: 1px dashed var(--border);
  }
  .empty .icon { font-size: 2rem; margin-bottom: 8px; }

  .btn {
    background: white; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 16px; cursor: pointer; font-size: .9rem; color: var(--text);
    user-select: none; transition: all .15s;
  }
  .btn-primary { background: var(--green); color: white; border-color: var(--green); }
  .btn-primary:hover { background: #186432; }
  .btn-sm { padding: 7px 12px; font-size: .82rem; }
  .btn-fab {
    position: fixed; bottom: 18px; right: 18px; z-index: 999;
    width: 56px; height: 56px; border-radius: 50%; padding: 0;
    background: var(--green); color: white; border: none;
    font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }

  /* Sync status */
  #sync-status {
    position: fixed; top: 8px; right: 8px; z-index: 9999;
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.92); color: #555;
    box-shadow: 0 1px 3px rgba(0,0,0,.15); user-select: none;
    pointer-events: none; transition: opacity .3s;
  }
  #sync-status[data-sync-type="ok"]   { color: #2a7a2a; }
  #sync-status[data-sync-type="err"]  { color: var(--red); }
  #sync-status[data-sync-type="sync"] { color: #1a3a7a; }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .item { grid-template-columns: 1fr; }
    .item-actions { flex-direction: row; flex-wrap: wrap; align-items: center; }
  }
</style>
<script>window.MAXIFER_SYNC_NAMESPACE = 'pendientes_llamar';</script>
<script type="module" src="./firebase-sync.js"></script>
</head>
<body>
<div id="sync-status">☁️ ...</div>

<header class="top">
  <div>
    <h1>📞 Pendientes <span class="accent">de llamar</span></h1>
  </div>
  <button class="btn btn-primary btn-sm" id="btnAdd">+ Agregar</button>
</header>

<div class="meta-bar">
  <span class="pill" id="pillPendientes">0 pendientes</span>
  <span class="pill muted" id="pillLlamados">0 llamados</span>
  <span style="margin-left:auto;font-size:.8rem;" id="lastUpdate"></span>
</div>

<div class="container">
  <div class="filters">
    <input type="text" id="buscador" placeholder="🔍 Buscar nombre, motivo, notas...">
    <button class="filter-btn active" data-filter="pendientes">Pendientes</button>
    <button class="filter-btn" data-filter="llamados">Llamados</button>
    <button class="filter-btn" data-filter="todos">Todos</button>
  </div>

  <form id="formAdd" class="form-add">
    <div class="form-grid">
      <label class="full">👤 Nombre / Cliente
        <input type="text" id="inNombre" required placeholder="Ej: Ferretería Belgrano">
      </label>
      <label>📞 Teléfono
        <input type="tel" id="inTel" placeholder="Ej: 11-5040-8378">
      </label>
      <label>📅 Fecha sugerida
        <input type="date" id="inFecha">
      </label>
      <label class="full">📝 Motivo
        <input type="text" id="inMotivo" placeholder="Ej: cobranza, presupuesto, devolución...">
      </label>
      <label class="full">🗒️ Notas
        <textarea id="inNotas" rows="2" placeholder="Detalles, recordatorios..."></textarea>
      </label>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-sm" id="btnCancel">Cancelar</button>
      <button type="submit" class="btn btn-primary btn-sm" id="btnSave">Guardar</button>
    </div>
  </form>

  <div id="lista"></div>
</div>

<button class="btn-fab" id="btnFab" title="Agregar">+</button>

<script>
'use strict';

const SK_PENDIENTES = 'maxifer_pendientes_llamar_v1';

let pendientes = [];
let filtroEstado = 'pendientes';
let editandoId = null;

try {
  pendientes = JSON.parse(localStorage.getItem(SK_PENDIENTES) || '[]');
} catch (e) {
  pendientes = [];
}

function guardar() {
  try { localStorage.setItem(SK_PENDIENTES, JSON.stringify(pendientes)); } catch (e) {}
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'recién';
  if (min < 60) return `hace ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `hace ${h} h`;
  const d = Math.floor(h / 24);
  return `hace ${d} d`;
}

function fmtTel(t) {
  return String(t || '').replace(/[^\d+]/g, '');
}

// ============================================================
// Render
// ============================================================
function render() {
  const lista = document.getElementById('lista');
  const q = document.getElementById('buscador').value.toLowerCase().trim();

  const pendCount = pendientes.filter(p => !p.llamado).length;
  const llamCount = pendientes.filter(p => p.llamado).length;
  document.getElementById('pillPendientes').textContent = `${pendCount} pendiente${pendCount===1?'':'s'}`;
  document.getElementById('pillLlamados').textContent = `${llamCount} llamado${llamCount===1?'':'s'}`;

  let items = pendientes.slice();
  if (filtroEstado === 'pendientes') items = items.filter(p => !p.llamado);
  else if (filtroEstado === 'llamados') items = items.filter(p => p.llamado);
  if (q) {
    items = items.filter(p =>
      (p.nombre||'').toLowerCase().includes(q) ||
      (p.motivo||'').toLowerCase().includes(q) ||
      (p.notas||'').toLowerCase().includes(q) ||
      (p.telefono||'').toLowerCase().includes(q)
    );
  }
  // Pendientes primero, después por fecha agregado descendente
  items.sort((a, b) => {
    if (!!a.llamado !== !!b.llamado) return a.llamado ? 1 : -1;
    return (b.agregado || '').localeCompare(a.agregado || '');
  });

  if (items.length === 0) {
    const msg = filtroEstado === 'pendientes'
      ? 'No tenés llamadas pendientes 🎉'
      : filtroEstado === 'llamados'
      ? 'Todavía no marcaste ningún llamado'
      : 'No hay registros. Tocá "+ Agregar".';
    lista.innerHTML = `<div class="empty"><div class="icon">📭</div>${msg}</div>`;
    return;
  }

  lista.innerHTML = items.map(p => {
    const tel = fmtTel(p.telefono);
    const telLink = tel ? `<a href="tel:${tel}">📞 ${escapeHtml(p.telefono)}</a>` : '';
    const waLink = tel ? `<a href="https://wa.me/${tel.replace(/^\+?54?9?/, '549')}" target="_blank">💬 WhatsApp</a>` : '';
    const fechaSug = p.fecha ? `<span title="Fecha sugerida">📅 ${escapeHtml(p.fecha)}</span>` : '';
    return `
      <div class="item ${p.llamado?'done':''}" data-id="${p.id}">
        <div>
          <div class="item-name">${escapeHtml(p.nombre)}</div>
          <div class="item-meta">
            ${[telLink, waLink, fechaSug].filter(Boolean).join(' · ')}
          </div>
          ${p.motivo ? `<div class="item-motivo">🎯 ${escapeHtml(p.motivo)}</div>` : ''}
          ${p.notas ? `<div class="item-notas">📝 ${escapeHtml(p.notas)}</div>` : ''}
        </div>
        <div class="item-actions">
          <span class="item-time">${timeAgo(p.agregado)}</span>
          ${p.llamado
            ? `<button class="btn-mini" data-action="undo">↺ Deshacer</button>`
            : `<button class="btn-mini green" data-action="done">✓ Llamé</button>`}
          <button class="btn-mini" data-action="edit">✎ Editar</button>
          <button class="btn-mini red" data-action="delete">🗑️</button>
        </div>
      </div>
    `;
  }).join('');

  // Bind actions
  lista.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('.item').dataset.id;
      const action = btn.dataset.action;
      if (action === 'done') marcarLlamado(id, true);
      else if (action === 'undo') marcarLlamado(id, false);
      else if (action === 'edit') abrirEditar(id);
      else if (action === 'delete') borrar(id);
    });
  });

  document.getElementById('lastUpdate').textContent =
    pendientes.length ? `· ${pendientes.length} total` : '';
}

// ============================================================
// Acciones
// ============================================================
function marcarLlamado(id, done) {
  const p = pendientes.find(x => x.id === id);
  if (!p) return;
  p.llamado = !!done;
  p.llamadoEn = done ? new Date().toISOString() : null;
  guardar();
  render();
}

function borrar(id) {
  const p = pendientes.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`¿Eliminar "${p.nombre}" de la lista?`)) return;
  pendientes = pendientes.filter(x => x.id !== id);
  guardar();
  render();
}

function abrirAgregar() {
  editandoId = null;
  document.getElementById('formAdd').classList.add('open');
  document.getElementById('inNombre').value = '';
  document.getElementById('inTel').value = '';
  document.getElementById('inMotivo').value = '';
  document.getElementById('inNotas').value = '';
  document.getElementById('inFecha').value = '';
  document.getElementById('btnSave').textContent = 'Guardar';
  setTimeout(() => document.getElementById('inNombre').focus(), 50);
}

function abrirEditar(id) {
  const p = pendientes.find(x => x.id === id);
  if (!p) return;
  editandoId = id;
  document.getElementById('formAdd').classList.add('open');
  document.getElementById('inNombre').value = p.nombre || '';
  document.getElementById('inTel').value = p.telefono || '';
  document.getElementById('inMotivo').value = p.motivo || '';
  document.getElementById('inNotas').value = p.notas || '';
  document.getElementById('inFecha').value = p.fecha || '';
  document.getElementById('btnSave').textContent = 'Actualizar';
  document.getElementById('formAdd').scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => document.getElementById('inNombre').focus(), 50);
}

function cerrarForm() {
  document.getElementById('formAdd').classList.remove('open');
  editandoId = null;
}

// ============================================================
// Bindings
// ============================================================
document.getElementById('btnAdd').addEventListener('click', abrirAgregar);
document.getElementById('btnFab').addEventListener('click', abrirAgregar);
document.getElementById('btnCancel').addEventListener('click', cerrarForm);

document.getElementById('formAdd').addEventListener('submit', e => {
  e.preventDefault();
  const data = {
    nombre: document.getElementById('inNombre').value.trim(),
    telefono: document.getElementById('inTel').value.trim(),
    motivo: document.getElementById('inMotivo').value.trim(),
    notas: document.getElementById('inNotas').value.trim(),
    fecha: document.getElementById('inFecha').value || null,
  };
  if (!data.nombre) return;

  if (editandoId) {
    const p = pendientes.find(x => x.id === editandoId);
    if (p) Object.assign(p, data, { editadoEn: new Date().toISOString() });
  } else {
    pendientes.push({
      id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      ...data,
      llamado: false,
      llamadoEn: null,
      agregado: new Date().toISOString(),
    });
  }
  guardar();
  cerrarForm();
  render();
});

document.getElementById('buscador').addEventListener('input', render);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroEstado = btn.dataset.filter;
    render();
  });
});

// ============================================================
// Firebase sync
// ============================================================
function _onRemoteSync(key) {
  if (key === SK_PENDIENTES) {
    try { pendientes = JSON.parse(localStorage.getItem(SK_PENDIENTES) || '[]'); } catch(e) { pendientes = []; }
  }
  render();
}
function _startSync() {
  if (!window.MaxiferSync) return;
  window.MaxiferSync.start([SK_PENDIENTES], {
    statusEl: document.getElementById('sync-status'),
    onRemote: _onRemoteSync
  });
}
if (window.MaxiferSync) _startSync();
else window.addEventListener('maxifer-sync-ready', _startSync);
window.addEventListener('maxifer-sync-started', () => _onRemoteSync(SK_PENDIENTES));

// Render inicial
render();
</script>
</body>
</html>
