<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendientes MAXIFER</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e8e8e8;
    --text: #1a1a1a;
    --text-soft: #666;
    --text-muted: #999;
    --accent: #ff6b35;
    --accent-soft: #fff1eb;
    --green: #2e9c5f;
    --green-soft: #e7f6ed;
    --red: #d63838;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 14px 100px;
    font-size: 15px;
    line-height: 1.4;
  }
  .container { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 18px; }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }
  .stats {
    display: flex;
    gap: 14px;
    margin-top: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .stats b { color: var(--text); font-weight: 600; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin: 14px 0 12px;
  }
  .tab {
    flex: 1;
    padding: 9px 8px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-soft);
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active {
    background: var(--text);
    color: #fff;
  }
  .tab .count {
    display: inline-block;
    margin-left: 5px;
    font-size: 11px;
    background: rgba(0,0,0,0.08);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .tab.active .count { background: rgba(255,255,255,0.2); }

  /* Search & filters */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .search-box {
    flex: 1;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 10px 12px 10px 34px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    opacity: 0.5;
  }

  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-chip.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* Group */
  .group { margin-bottom: 18px; }
  .group-header {
    display: flex;
    align-items: center;
    margin: 12px 4px 8px;
    gap: 8px;
  }
  .group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .group-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .group.empty { display: none; }

  /* Item */
  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .item.dragging {
    opacity: 0.5;
    transform: scale(0.98);
  }
  .item.drag-over {
    border-color: var(--accent);
    border-style: dashed;
  }
  .item.urgent {
    border-left: 3px solid var(--red);
  }
  .item.hidden-search { display: none; }

  .item-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .drag-handle {
    color: var(--text-muted);
    font-size: 18px;
    cursor: grab;
    flex-shrink: 0;
    padding: 0 2px;
    line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }

  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }
  .checkbox:hover { border-color: var(--accent); }
  .checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .checkbox.checked::after {
    content: '✓';
    color: #fff;
    font-weight: bold;
    font-size: 14px;
  }

  .item-main { flex: 1; min-width: 0; }
  .item-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .item-emoji { font-size: 16px; }
  .item-summary {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .badge {
    background: var(--red);
    color: #fff;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .group-tag {
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 600;
  }
  .arrow {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .item.open .arrow { transform: rotate(180deg); }

  .item-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  .item.open .item-body {
    max-height: 2000px;
  }
  .item-body-inner {
    padding: 0 14px 14px 46px;
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.55;
  }
  .item-body-inner p { margin-bottom: 8px; }
  .item-body-inner ul { margin-left: 16px; margin-bottom: 8px; }
  .item-body-inner li { margin-bottom: 3px; }
  .item-body-inner .note {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 8px;
    font-size: 13px;
    color: #b04a1f;
  }
  .item-body-inner .warning {
    background: #fff0f0;
    border-left: 3px solid var(--red);
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 8px;
    font-size: 13px;
    color: #a82626;
  }
  .item-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-soft);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
  }
  .action-btn:hover {
    background: var(--bg);
    color: var(--text);
  }
  .action-btn.danger:hover {
    background: #fff0f0;
    color: var(--red);
    border-color: var(--red);
  }

  /* History */
  .history-item {
    background: var(--green-soft);
    border: 1px solid #cee8d8;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .history-check {
    width: 22px; height: 22px;
    background: var(--green);
    border-radius: 6px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .history-text { flex: 1; min-width: 0; }
  .history-title {
    font-size: 14px;
    color: #1d6e3f;
    text-decoration: line-through;
    text-decoration-color: rgba(46,156,95,0.4);
  }
  .history-meta {
    font-size: 11px;
    color: #5a8a6e;
    margin-top: 2px;
  }
  .history-meta b { color: #2e9c5f; }
  .restore-btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0;
  }
  .restore-btn:hover { background: var(--green); color: #fff; }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Floating add button */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px; height: 56px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,107,53,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    padding: 0;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    width: 100%;
    max-width: 600px;
    border-radius: 16px 16px 0 0;
    padding: 20px 18px 24px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; padding: 20px; }
    .modal { border-radius: 16px; }
  }
  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }
  .checkbox-field {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-field input { width: auto; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .footer-actions {
    text-align: center;
    margin-top: 24px;
  }
  .footer-actions button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    margin: 0 4px;
  }
  .footer-actions button:hover { border-color: var(--text-muted); color: var(--text-soft); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* Firebase sync status */
  #sync-status {
    position: fixed; top: 8px; right: 8px; z-index: 9999;
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.92); color: #555;
    box-shadow: 0 1px 3px rgba(0,0,0,.15); user-select: none;
    pointer-events: none; transition: opacity .3s;
  }
  #sync-status[data-sync-type="ok"]   { color: #2a7a2a; }
  #sync-status[data-sync-type="err"]  { color: #c8102e; }
  #sync-status[data-sync-type="sync"] { color: #1a3a7a; }
</style>
<script>window.MAXIFER_SYNC_NAMESPACE = 'pendientes_maxifer';</script>
<script type="module" src="./firebase-sync.js"></script>
</head>
<body>
<div id="sync-status">☁️ ...</div>
<div class="container">
  <header>
    <h1><span class="dot"></span>Pendientes MAXIFER</h1>
    <div class="stats">
      <span><b id="stat-active">0</b> activos</span>
      <span>·</span>
      <span><b id="stat-done">0</b> hechos</span>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-panel="activos" onclick="switchTab(this)">
      Activos <span class="count" id="tab-count-activos">0</span>
    </div>
    <div class="tab" data-panel="historial" onclick="switchTab(this)">
      Historial <span class="count" id="tab-count-historial">0</span>
    </div>
  </div>

  <div id="panel-activos" class="panel">
    <div class="controls">
      <div class="search-box">
        <input type="text" id="search" placeholder="Buscar pendiente..." oninput="renderActive()">
      </div>
    </div>
    <div class="filters" id="filters"></div>
    <div id="active-list"></div>
    <div class="empty" id="active-empty" style="display:none;">No hay pendientes que coincidan.</div>
  </div>

  <div id="panel-historial" class="panel" style="display:none;">
    <div id="history-list"></div>
    <div class="empty" id="history-empty">Cuando completes un pendiente, va a aparecer acá.</div>
  </div>

  <div class="footer-actions">
    <button onclick="exportData()">📥 Exportar backup</button>
    <button onclick="importData()">📤 Importar backup</button>
    <button onclick="clearHistory()">Vaciar historial</button>
  </div>
</div>

<button class="fab" onclick="openModal()" title="Agregar pendiente">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <h2 id="modal-title">Nuevo pendiente</h2>
    <div class="field">
      <label>Título</label>
      <input type="text" id="f-title" placeholder="Ej: Llamar a proveedor X">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Grupo</label>
        <select id="f-group">
          <option value="Papá">👨 Papá</option>
          <option value="Maxi">🙋 Maxi</option>
          <option value="Auto">🚗 Auto</option>
        </select>
      </div>
      <div class="field" style="flex:0 0 100px;">
        <label>Emoji</label>
        <input type="text" id="f-emoji" placeholder="🔧" maxlength="2">
      </div>
    </div>
    <div class="field">
      <label>Resumen corto (opcional)</label>
      <input type="text" id="f-summary" placeholder="Una línea descriptiva">
    </div>
    <div class="field">
      <label>Detalle completo (opcional)</label>
      <textarea id="f-detail" placeholder="Toda la info del pendiente..."></textarea>
    </div>
    <div class="field">
      <label class="checkbox-field">
        <input type="checkbox" id="f-urgent">
        <span>Marcar como urgente 🔴</span>
      </label>
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>Nuevo grupo (opcional)</label>
      <input type="text" id="f-newgroup" placeholder="Si querés crear un grupo nuevo">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveItem()">Guardar</button>
    </div>
    <button id="delete-btn" class="action-btn danger" style="display:none;width:100%;margin-top:10px;padding:10px;" onclick="deleteItem()">Eliminar pendiente</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'maxifer_pendientes_v3';

const DEFAULT_DATA = {
  items: [
    { id: 'p1', title: 'Lista 2', emoji: '💰', group: 'Papá', summary: 'Precios bajos para clientes grosos', urgent: false, detail: 'Lista alternativa con precios más bajos para clientes grosos / importadores potenciales.\n\n**Uso restringido:** solo vos y papá. Vendedores NO porque saldríamos perdiendo.\n\n**Tareas:**\n- Definir productos que entran\n- Evaluar costos producto por producto\n- Definir margen mínimo aceptable\n- Decidir cómo guardarla y manejarla\n\n⚠️ Si se filtra a vendedores o clientes habituales, problema serio de confianza.', order: 0 },
    { id: 'p2', title: 'Porta-exhibidores', emoji: '🏪', group: 'Papá', summary: 'Propuesta integral cliente: mueble + estructura', urgent: false, detail: 'Presentación de cómo armar el negocio del cliente con exhibidores MAXIFER + gavetas + mueble + estructura.\n\n**Dos formatos:**\n- Contra pared: definir estructura para fijar a la pared\n- Exento: módulo independiente para el medio del local\n\nDiscutir con papá materiales, costos y diseños.', order: 1 },
    { id: 'p3', title: 'Gavetitas plásticas', emoji: '📦', group: 'Papá', summary: 'Mini-gavetas vs. China para revender a mecánicos', urgent: false, detail: 'Competencia china con cajitas chicas a bajo costo. Necesitamos respuesta.\n\n**Plan:** mini-gavetas sin exhibidor para que ferreteros revendan a mecánicos.\n\n**Productos candidatos:** terminales, perillas, picos, clips, chavetas partidas.\n\n**Tareas:**\n- Buscar proveedores\n- Cotizar costos\n- Armar combinaciones por gaveta\n- Calcular precio final vs. China\n\n⚠️ Cuidado con canibalizar al ferretero.', order: 2 },
    { id: 'p4', title: 'O-rings métricos', emoji: '⚙️', group: 'Papá', summary: 'Línea nueva (hoy solo pulgadas)', urgent: false, detail: 'Sumar línea métrica como producto nuevo.\n\n**Tareas:**\n- Armar Excel de compra (medidas, cantidades, costos)\n- Calcular inversión inicial\n- Definir con papá estrategia de surtidos (¿completo o uno chico?)\n- Cerrar monto de inversión', order: 3 },
    { id: 'p6', title: 'Viaje al Sur', emoji: '🧳', group: 'Maxi', summary: 'Checklist + calendario + contactar clientes', urgent: false, detail: 'Próximo viaje al Sur para visitar clientes y levantar pedidos.\n\n**Tareas:**\n- Armar checklist completo\n- Calendario por zona\n- Etiquetas WhatsApp (no grupo)\n- Contactar a cada cliente con días previstos\n- Levantar pedidos previos\n\n💡 Etiquetas mejor que grupo: comunicación 1 a 1.', order: 4 },
    { id: 'p7', title: 'Topes y tapones · Nadia', emoji: '🔩', group: 'Maxi', summary: 'Pedido cliente de Nadia', urgent: false, detail: 'Pedido de topes y tapones de goma para cliente que trajo Nadia.\n\n**Tareas:**\n- Confirmar medidas/cantidades con Nadia\n- Revisar stock\n- Cotizar y confirmar precio\n- Coordinar despacho', order: 5 },
    { id: 'p13', title: 'Vendedor de calle', emoji: '🚶', group: 'Maxi', summary: 'Visitas, seguimiento, reposición, surtidos', urgent: false, detail: 'Contratar vendedor de calle.\n\n**Funciones:**\n- Visitar clientes\n- Dar seguimiento\n- Mandar mensajes\n- Levantar reposiciones\n- Convencer de agregar surtidos\n\n💡 Considerar contratar primero este antes que el de compu (impacto directo en facturación).', order: 6 },
    { id: 'p14', title: 'Vendedor de compu', emoji: '💻', group: 'Maxi', summary: 'Responde mensajes y hace post-venta', urgent: false, detail: 'Contratar vendedor para tareas de oficina.\n\n**Funciones:**\n- Responder mensajes\n- Hacer post-venta\n- Trabajar desde la oficina\n\n💡 Esta función la podés cubrir parcialmente vos / Micky / Nadia un tiempo más mientras se afianza el de calle.', order: 7 },
    { id: 'p15', title: 'Mini circuitos cortos', emoji: '🚐', group: 'Maxi', summary: 'Salidas 1-2 días a clientes cerca', urgent: false, detail: 'Hacerme tiempo y cranear salidas cortas de 1-2 días para visitar clientes que no estén tan lejos. Mini circuitos esporádicos.\n\n**Tareas:**\n- Definir clientes objetivo\n- Armar agenda mensual de mini-salidas\n- Sumarlo a las etiquetas WhatsApp por zona\n\n⚠️ Choca con la idea del vendedor de calle. Definir bien quién hace qué.', order: 8 },
    { id: 'p8', title: 'Inyectores', emoji: '⛽', group: 'Auto', summary: 'Pre-viaje. Si sucios = tirones en ruta', urgent: false, detail: 'Llevar a revisar los inyectores antes del viaje largo. Si están sucios o con problemas, mal consumo y tirones en ruta.', order: 9 },
    { id: 'p9', title: 'Mecánico general', emoji: '🔧', group: 'Auto', summary: 'Niveles, correas, frenos, batería, luces, filtros', urgent: false, detail: 'Revisión general con el mecánico de confianza pre-viaje.\n\n**Decile que es para viaje largo:**\n- Niveles (aceite, refrigerante, frenos, dirección)\n- Correas y mangueras\n- Frenos (pastillas, discos)\n- Batería\n- Luces\n- Filtros (aceite, aire, combustible)', order: 10 },
    { id: 'p10', title: 'Amortiguadores', emoji: '🛞', group: 'Auto', summary: 'Clave ruta Sur. Antes de alineación', urgent: false, detail: 'Revisar estado de los amortiguadores. Para ruta del Sur (rutas largas, asfalto irregular) son clave para seguridad y comodidad.\n\n⚠️ Hacer ANTES de la alineación.', order: 11 },
    { id: 'p11', title: 'Alineación y balanceo', emoji: '📐', group: 'Auto', summary: 'Después amortig. Revisar neumáticos también', urgent: false, detail: 'Llevarlo al taller después de los amortiguadores (si tocan suspensión, la alineación se desajusta).\n\n💡 Aprovechá y revisá presión y estado de los neumáticos. Si están gastados, mejor cambiarlos antes del viaje.', order: 12 },
    { id: 'p12', title: 'Tapicero', emoji: '🪑', group: 'Auto', summary: 'Alza-baúl roto en el robo', urgent: false, detail: 'Llevar al tapicero para arreglar el alza-baúl que se rompió cuando entraron al auto. Prioridad menor que mecánica, pero importante para el viaje (vas a cargar mercadería en el baúl).', order: 13 }
  ],
  history: [
    { id: 'p5', title: 'Aumentar listas', emoji: '🔴', group: 'Maxi', summary: 'Todas las listas actualizadas', urgent: true, detail: 'Aumentar todas las listas (Excel, WhatsApp, web, Bsale, links, exhibidores).', doneAt: new Date().toISOString(), order: 99 }
  ],
  groups: ['Papá', 'Maxi', 'Auto']
};

const GROUP_META = {
  'Papá': { icon: '👨', color: '#3b82f6' },
  'Maxi': { icon: '🙋', color: '#10b981' },
  'Auto': { icon: '🚗', color: '#f59e0b' }
};

let state = loadState();
let activeFilter = 'all';
let editingId = null;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s && s.items) return s;
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function getGroupMeta(name) {
  return GROUP_META[name] || { icon: '📌', color: '#888' };
}

function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDetail(text) {
  if (!text) return '';
  let html = escapeHTML(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^⚠️ (.+)$/gm, '<div class="warning">⚠️ $1</div>');
  html = html.replace(/^💡 (.+)$/gm, '<div class="note">💡 $1</div>');
  const lines = html.split('\n');
  let result = '';
  let inList = false;
  for (const line of lines) {
    if (line.startsWith('- ')) {
      if (!inList) { result += '<ul>'; inList = true; }
      result += `<li>${line.slice(2)}</li>`;
    } else {
      if (inList) { result += '</ul>'; inList = false; }
      if (line.trim()) {
        if (line.startsWith('<div')) result += line;
        else result += `<p>${line}</p>`;
      }
    }
  }
  if (inList) result += '</ul>';
  return result;
}

function formatDate(iso) {
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm} ${hh}:${min}`;
}

function renderFilters() {
  const filters = document.getElementById('filters');
  const groups = state.groups;
  filters.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'filter-chip' + (activeFilter === 'all' ? ' active' : '');
  all.textContent = 'Todos';
  all.onclick = () => { activeFilter = 'all'; renderActive(); };
  filters.appendChild(all);

  groups.forEach(g => {
    const meta = getGroupMeta(g);
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (activeFilter === g ? ' active' : '');
    chip.textContent = `${meta.icon} ${g}`;
    chip.onclick = () => { activeFilter = g; renderActive(); };
    filters.appendChild(chip);
  });

  const urgent = document.createElement('div');
  urgent.className = 'filter-chip' + (activeFilter === 'urgent' ? ' active' : '');
  urgent.textContent = '🔴 Urgentes';
  urgent.onclick = () => { activeFilter = 'urgent'; renderActive(); };
  filters.appendChild(urgent);
}

function renderActive() {
  renderFilters();
  const list = document.getElementById('active-list');
  const empty = document.getElementById('active-empty');
  const search = document.getElementById('search').value.toLowerCase().trim();
  list.innerHTML = '';

  let items = [...state.items];
  items.sort((a, b) => (a.order || 0) - (b.order || 0));

  if (activeFilter === 'urgent') {
    items = items.filter(i => i.urgent);
  } else if (activeFilter !== 'all') {
    items = items.filter(i => i.group === activeFilter);
  }

  if (search) {
    items = items.filter(i =>
      (i.title || '').toLowerCase().includes(search) ||
      (i.summary || '').toLowerCase().includes(search) ||
      (i.detail || '').toLowerCase().includes(search) ||
      (i.group || '').toLowerCase().includes(search)
    );
  }

  if (items.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
  }

  // Group rendering
  const grouped = {};
  items.forEach(i => {
    if (!grouped[i.group]) grouped[i.group] = [];
    grouped[i.group].push(i);
  });

  const groupOrder = state.groups.filter(g => grouped[g]);

  groupOrder.forEach(g => {
    const meta = getGroupMeta(g);
    const groupItems = grouped[g];
    const groupDiv = document.createElement('div');
    groupDiv.className = 'group';
    groupDiv.innerHTML = `
      <div class="group-header">
        <span class="group-title">${meta.icon} ${g}</span>
        <span class="group-count">${groupItems.length}</span>
      </div>
    `;
    groupItems.forEach(item => {
      groupDiv.appendChild(buildItem(item));
    });
    list.appendChild(groupDiv);
  });

  updateStats();
}

function buildItem(item) {
  const div = document.createElement('div');
  div.className = 'item' + (item.urgent ? ' urgent' : '');
  div.dataset.id = item.id;
  div.draggable = true;

  const detailHtml = formatDetail(item.detail);

  div.innerHTML = `
    <div class="item-header" onclick="toggleItem(this, event)">
      <div class="drag-handle" onclick="event.stopPropagation()">⋮⋮</div>
      <div class="checkbox" onclick="completeItem(event, '${item.id}')"></div>
      <div class="item-main">
        <div class="item-title">
          ${item.emoji ? `<span class="item-emoji">${escapeHTML(item.emoji)}</span>` : ''}
          <span>${escapeHTML(item.title)}</span>
          ${item.urgent ? '<span class="badge">URGENTE</span>' : ''}
        </div>
        ${item.summary ? `<div class="item-summary">${escapeHTML(item.summary)}</div>` : ''}
      </div>
      <div class="arrow">▼</div>
    </div>
    <div class="item-body">
      <div class="item-body-inner">
        ${detailHtml || '<p style="color:var(--text-muted);font-style:italic;">Sin detalle.</p>'}
        <div class="item-actions">
          <button class="action-btn" onclick="event.stopPropagation();editItem('${item.id}')">✏️ Editar</button>
          <button class="action-btn danger" onclick="event.stopPropagation();askDelete('${item.id}')">🗑️ Eliminar</button>
        </div>
      </div>
    </div>
  `;

  // Drag events
  div.addEventListener('dragstart', e => {
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', item.id);
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    document.querySelectorAll('.item').forEach(i => i.classList.remove('drag-over'));
  });
  div.addEventListener('dragover', e => {
    e.preventDefault();
    if (!div.classList.contains('dragging')) div.classList.add('drag-over');
  });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('drag-over');
    const fromId = e.dataTransfer.getData('text/plain');
    if (fromId !== item.id) reorderItems(fromId, item.id);
  });

  return div;
}

function reorderItems(fromId, toId) {
  const from = state.items.find(i => i.id === fromId);
  const to = state.items.find(i => i.id === toId);
  if (!from || !to) return;
  // If different group, move to that group
  if (from.group !== to.group) {
    from.group = to.group;
  }
  // Reorder
  const sorted = [...state.items].sort((a,b) => (a.order||0) - (b.order||0));
  const fromIdx = sorted.findIndex(i => i.id === fromId);
  const toIdx = sorted.findIndex(i => i.id === toId);
  sorted.splice(fromIdx, 1);
  sorted.splice(toIdx, 0, from);
  sorted.forEach((it, idx) => it.order = idx);
  saveState();
  renderActive();
}

function toggleItem(header, event) {
  if (event.target.closest('.checkbox') || event.target.closest('.action-btn') || event.target.closest('.drag-handle')) return;
  header.parentElement.classList.toggle('open');
}

function completeItem(event, id) {
  event.stopPropagation();
  const idx = state.items.findIndex(i => i.id === id);
  if (idx === -1) return;
  const item = state.items[idx];
  item.doneAt = new Date().toISOString();
  state.history.unshift(item);
  state.items.splice(idx, 1);
  saveState();
  renderActive();
  renderHistory();
  toast('✓ Movido al historial');
}

function restoreItem(id) {
  const idx = state.history.findIndex(i => i.id === id);
  if (idx === -1) return;
  const item = state.history[idx];
  delete item.doneAt;
  // Set order to last
  const maxOrder = state.items.reduce((m, i) => Math.max(m, i.order || 0), 0);
  item.order = maxOrder + 1;
  state.items.push(item);
  state.history.splice(idx, 1);
  saveState();
  renderActive();
  renderHistory();
  toast('↩ Restaurado a activos');
}

function askDelete(id) {
  if (confirm('¿Eliminar este pendiente? No se puede deshacer.')) {
    state.items = state.items.filter(i => i.id !== id);
    saveState();
    renderActive();
    toast('Eliminado');
  }
}

function openModal(item = null) {
  editingId = item ? item.id : null;
  document.getElementById('modal-title').textContent = item ? 'Editar pendiente' : 'Nuevo pendiente';
  document.getElementById('f-title').value = item ? item.title : '';
  document.getElementById('f-emoji').value = item ? (item.emoji || '') : '';
  document.getElementById('f-summary').value = item ? (item.summary || '') : '';
  document.getElementById('f-detail').value = item ? (item.detail || '') : '';
  document.getElementById('f-urgent').checked = item ? item.urgent : false;
  document.getElementById('f-newgroup').value = '';

  const sel = document.getElementById('f-group');
  sel.innerHTML = '';
  state.groups.forEach(g => {
    const meta = getGroupMeta(g);
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = `${meta.icon} ${g}`;
    sel.appendChild(opt);
  });
  if (item) sel.value = item.group;

  document.getElementById('delete-btn').style.display = item ? 'block' : 'none';
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingId = null;
}

function saveItem() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('El título es obligatorio'); return; }

  const newGroupRaw = document.getElementById('f-newgroup').value.trim();
  let group = document.getElementById('f-group').value;
  if (newGroupRaw) {
    group = newGroupRaw;
    if (!state.groups.includes(group)) state.groups.push(group);
  }

  const data = {
    title,
    emoji: document.getElementById('f-emoji').value.trim(),
    group,
    summary: document.getElementById('f-summary').value.trim(),
    detail: document.getElementById('f-detail').value.trim(),
    urgent: document.getElementById('f-urgent').checked
  };

  if (editingId) {
    const idx = state.items.findIndex(i => i.id === editingId);
    if (idx !== -1) state.items[idx] = { ...state.items[idx], ...data };
    toast('✓ Guardado');
  } else {
    const maxOrder = state.items.reduce((m, i) => Math.max(m, i.order || 0), 0);
    state.items.push({
      id: 'i' + Date.now(),
      ...data,
      order: maxOrder + 1
    });
    toast('✓ Pendiente agregado');
  }
  saveState();
  renderActive();
  closeModal();
}

function editItem(id) {
  const item = state.items.find(i => i.id === id);
  if (item) openModal(item);
}

function deleteItem() {
  if (!editingId) return;
  if (confirm('¿Eliminar este pendiente? No se puede deshacer.')) {
    state.items = state.items.filter(i => i.id !== editingId);
    saveState();
    renderActive();
    closeModal();
    toast('Eliminado');
  }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  list.innerHTML = '';
  if (state.history.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    state.history.forEach(h => {
      const meta = getGroupMeta(h.group);
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <div class="history-check">✓</div>
        <div class="history-text">
          <div class="history-title">${escapeHTML(h.emoji || '')} ${escapeHTML(h.title)}</div>
          <div class="history-meta"><b>${meta.icon} ${escapeHTML(h.group)}</b> · ${formatDate(h.doneAt)}</div>
        </div>
        <button class="restore-btn" onclick="restoreItem('${h.id}')">↩ Restaurar</button>
      `;
      list.appendChild(div);
    });
  }
  updateStats();
}

function clearHistory() {
  if (!state.history.length) { toast('Historial ya vacío'); return; }
  if (confirm(`¿Vaciar historial? (${state.history.length} pendientes completados)`)) {
    state.history = [];
    saveState();
    renderHistory();
    toast('Historial vaciado');
  }
}

function updateStats() {
  document.getElementById('stat-active').textContent = state.items.length;
  document.getElementById('stat-done').textContent = state.history.length;
  document.getElementById('tab-count-activos').textContent = state.items.length;
  document.getElementById('tab-count-historial').textContent = state.history.length;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-activos').style.display = tab.dataset.panel === 'activos' ? 'block' : 'none';
  document.getElementById('panel-historial').style.display = tab.dataset.panel === 'historial' ? 'block' : 'none';
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pendientes-maxifer-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Backup descargado');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.items && data.history && data.groups) {
          if (confirm('¿Reemplazar todos los datos actuales con el backup?')) {
            state = data;
            saveState();
            renderActive();
            renderHistory();
            toast('✓ Backup restaurado');
          }
        } else {
          alert('Archivo inválido');
        }
      } catch {
        alert('No se pudo leer el archivo');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Init
renderActive();
renderHistory();

// ============================================================
// Firebase sync
// ============================================================
function _onRemoteSync(){
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s && s.items) state = s;
  } catch(e) {}
  renderActive();
  renderHistory();
}
function _startSync(){
  if (!window.MaxiferSync) return;
  window.MaxiferSync.start([STORAGE_KEY], {
    statusEl: document.getElementById('sync-status'),
    onRemote: _onRemoteSync
  });
}
if (window.MaxiferSync) _startSync();
else window.addEventListener('maxifer-sync-ready', _startSync);
window.addEventListener('maxifer-sync-started', _onRemoteSync);
</script>
